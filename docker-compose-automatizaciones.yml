  # ── 10. Maestra Velsa NetLife Sync ────────────────────────────────────────────
  maestra-velsa-netlife:
    image: node:20-slim
    container_name: auto_maestra_velsa_netlife
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\apache_superset\maestra-velsa-netlife-sync:/app
      - maestra_velsa_netlife_nm:/app/node_modules

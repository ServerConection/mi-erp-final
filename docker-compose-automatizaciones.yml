# ── Volúmenes nombrados para node_modules ────────────────────────────────────────
# Docker instala las dependencias en Linux, separadas de las de Windows.
# Esto evita conflictos con módulos nativos (bcrypt, sqlite3, etc.)
volumes:
  bitrix_backend_nm:
  ghl_sync_backend_nm:
  ghl_sync_netlife_nm:
  jotform_sync_netlife_nm:
  sync_maestras_netlife_nm:
  jotform_base_nm:
  jotform_analista_nm:
  jotform_sync_nm:
  maestra_bitrix_etl_nm:
  maestra_velsa_netlife_nm:
  reporte_automatizado_nm:

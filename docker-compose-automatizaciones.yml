# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  AUTOMATIZACIONES DOCKER COMPOSE                                             ║
# ║  11 servicios Node.js — se inician solos al arrancar Docker Desktop          ║
# ║                                                                              ║
# ║  INSTRUCCIONES:                                                              ║
# ║  1. Copia este archivo a:                                                    ║
# ║     C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\            ║
# ║     DesarrolloBaseDatos\docker-compose.yml                                   ║
# ║  2. Abre una terminal en esa carpeta                                         ║
# ║  3. Primera vez:  docker compose up -d --build                               ║
# ║  4. Ver logs:     docker compose logs -f                                     ║
# ║  5. Ver un solo servicio: docker compose logs -f bitrix-backend              ║
# ║  6. Detener todo: docker compose down                                        ║
# ║  7. Reiniciar uno: docker compose restart ghl-sync-backend                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:

  # ── 1. Bitrix24 Backend ──────────────────────────────────────────────────────
  bitrix-backend:
    image: node:20-slim
    container_name: auto_bitrix_backend
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\Bitrix24\bitrix_backend:/app
      - bitrix_backend_nm:/app/node_modules
    command: sh -c "npm install --silent && node index.js"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── 2. GHL Sync Backend ──────────────────────────────────────────────────────
  ghl-sync-backend:
    image: node:20-slim
    container_name: auto_ghl_sync_backend
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\HoGiLevel\ghl-sync-backend:/app
      - ghl_sync_backend_nm:/app/node_modules
    command: sh -c "npm install --silent && node server.js"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── 3. GHL Sync NetLife ──────────────────────────────────────────────────────
  ghl-sync-netlife:
    image: node:20-slim
    container_name: auto_ghl_sync_netlife
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\HoGiLevel\ghl-sync-NetLife:/app
      - ghl_sync_netlife_nm:/app/node_modules
    command: sh -c "npm install --silent && npm start"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── 4. JotForm Sync NetLife (HGL) ────────────────────────────────────────────
  jotform-sync-netlife:
    image: node:20-slim
    container_name: auto_jotform_sync_netlife
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\JotForm\HGL\jotform-sync-netlife:/app
      - jotform_sync_netlife_nm:/app/node_modules
    command: sh -c "npm install --silent && npm start"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── 5. Sync Maestras NetLife (HGL) ───────────────────────────────────────────
  sync-maestras-netlife:
    image: node:20-slim
    container_name: auto_sync_maestras_netlife
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\JotForm\HGL\sync-maestras-netlife:/app
      - sync_maestras_netlife_nm:/app/node_modules
    command: sh -c "npm install --silent && npm start"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── 6. JotForm Base Sync ─────────────────────────────────────────────────────
  jotform-base:
    image: node:20-slim
    container_name: auto_jotform_base
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\JotForm\JotForm\Base:/app
      - jotform_base_nm:/app/node_modules
    command: sh -c "npm install --silent && node sync_jotform.js"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── 7. JotForm Analista Sync ──────────────────────────────────────────────────
  jotform-analista:
    image: node:20-slim
    container_name: auto_jotform_analista
    working_dir: /app
    volumes:
      - C:\Users\Usuario-PC\Desktop\AREA_DESARROLLO\AREA_DESARROLLO\DesarrolloBaseDatos\JotForm\JotForm\jotform-analista-sync:/app
      - jotform_analista_nm:/app/node_modules
    command: sh -c "npm install --silent && node sync.js"
    restart: always
    logging:
      driver: "json-file"
